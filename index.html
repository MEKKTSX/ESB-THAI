<!DOCTYPE html>
<html lang="th" class="dark"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESB Thai - Premium Dashboard</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0B1121">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ESB Thai">
    <link rel="apple-touch-icon" href="icon.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        navy: { 900: '#0B1121', 800: '#151F32', 700: '#1E293B', 600: '#334155' },
                        brand: { blue: '#2563EB', accent: '#3B82F6', yellow: '#FACC15' },
                        srs: {
                            again: '#271F2A', againText: '#F43F5E',
                            hard: '#2C241C', hardText: '#F59E0B',
                            good: '#1A2942', goodText: '#3B82F6',
                            easy: '#1E2C22', easyText: '#10B981'
                        }
                    },
                    fontFamily: { 
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                        display: ['Inter', 'sans-serif']
                    },
                    boxShadow: { 'glow-yellow': '0 0 25px rgba(250, 204, 21, 0.4)' }
                }
            }
        }
    </script>
    
    <style>
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; touch-action: pan-y; }
        .card-tap-active:active { transform: scale(0.98); transition: transform 0.1s; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0B1121; }
        ::-webkit-scrollbar-thumb { background: #1E293B; border-radius: 4px; }
        .progress-bar-fill { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .toggle-checkbox:checked { right: 0; border-color: #2563EB; }
        .toggle-checkbox:checked + .toggle-label { background-color: #2563EB; }
        
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        /* 🌟 ซ่อมบั๊กที่ 2: บังคับยัดฟอนต์ไอคอนด้วยคำสั่ง !important กันเบราว์เซอร์มือถือดื้อ */
        .material-symbols-outlined {
          font-family: 'Material Symbols Outlined' !important;
          font-weight: normal !important;
          font-style: normal !important;
          font-size: 24px;
          line-height: 1;
          letter-spacing: normal !important;
          text-transform: none !important;
          display: inline-block;
          white-space: nowrap !important;
          word-wrap: normal !important;
          direction: ltr !important;
          -webkit-font-feature-settings: 'liga' !important;
          -webkit-font-smoothing: antialiased;
        }
    </style>

    <script>
        window.ESB_Sessions = [];
        window.ESB_Features = {};
        window.SharedComponents = {};
    </script>

    <script src="./session1.js?v=3000"></script>
    <script src="./session2.js?v=3000"></script>
    <script src="./session2.1.js?v=3000"></script>
    <script src="./session2.2.js?v=3000"></script>
    <script src="./session2.3.js?v=3000"></script>
    <script src="./session3.js?v=3000"></script>

    <script type="text/babel" src="./shared.js?v=3000"></script>
    <script type="text/babel" src="./bookmarkFeature.js?v=3000"></script> 
    <script type="text/babel" src="./upcomingFeature.js?v=3000"></script> 
    <script type="text/babel" src="./retentionFeature.js?v=3000"></script>
    <script type="text/babel" src="./practiceFeature.js?v=3000"></script>
    
    <script type="text/babel" src="./home.js?v=3000"></script>
    <script type="text/babel" src="./study.js?v=3000"></script>
    <script type="text/babel" src="./review.js?v=3000"></script>
    <script type="text/babel" src="./profile.js?v=3000"></script>
    <script type="text/babel" src="./notificationFeature.js?v=3000"></script>
    <script type="text/babel" src="./aiPracticeFeature.js?v=3000"></script>
    
    <script type="text/babel" src="./app.js?v=3000"></script>
    
</head>
<body class="bg-[#0B1121] text-slate-200 font-sans min-h-screen select-none overflow-x-hidden">
    <div id="root"></div>
</body>
</html>
